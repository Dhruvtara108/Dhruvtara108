<svg xmlns="http://www.w3.org/2000/svg" width="900" height="280" viewBox="0 0 900 280">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0010;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#12002a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06000f;stop-opacity:1" />
    </linearGradient>

    <!-- Neon glow filters -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur1"/>
      <feGaussianBlur stdDeviation="12" result="blur2"/>
      <feGaussianBlur stdDeviation="20" result="blur3"/>
      <feMerge>
        <feMergeNode in="blur3"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Scan line pattern -->
    <pattern id="scanlines" x="0" y="0" width="2" height="4" patternUnits="userSpaceOnUse">
      <rect width="2" height="1" fill="rgba(180,0,255,0.04)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="url(#bgGrad)"/>
  <rect width="900" height="280" fill="url(#scanlines)"/>

  <!-- ========== PIXEL ART GAME SPRITES ========== -->

  <!-- SPACE INVADER 1 - top left area -->
  <g opacity="0.18" filter="url(#subtleGlow)" fill="#cc44ff">
    <!-- row1 -->
    <rect x="30" y="20" width="6" height="6"/><rect x="54" y="20" width="6" height="6"/>
    <!-- row2 -->
    <rect x="36" y="26" width="6" height="6"/><rect x="48" y="26" width="6" height="6"/>
    <!-- row3 -->
    <rect x="30" y="32" width="30" height="6"/>
    <!-- row4 -->
    <rect x="24" y="38" width="6" height="6"/><rect x="30" y="38" width="6" height="6"/><rect x="48" y="38" width="6" height="6"/><rect x="54" y="38" width="6" height="6"/>
    <!-- row5 -->
    <rect x="24" y="44" width="42" height="6"/>
    <!-- row6 -->
    <rect x="24" y="50" width="6" height="6"/><rect x="36" y="50" width="18" height="6"/><rect x="60" y="50" width="6" height="6"/>
    <!-- row7 -->
    <rect x="30" y="56" width="6" height="6"/><rect x="54" y="56" width="6" height="6"/>
    <!-- row8 -->
    <rect x="24" y="62" width="6" height="6"/><rect x="36" y="62" width="6" height="6"/><rect x="48" y="62" width="6" height="6"/><rect x="60" y="62" width="6" height="6"/>
  </g>

  <!-- SPACE INVADER 2 - top right -->
  <g opacity="0.15" filter="url(#subtleGlow)" fill="#8800ff">
    <rect x="820" y="15" width="6" height="6"/><rect x="844" y="15" width="6" height="6"/>
    <rect x="826" y="21" width="6" height="6"/><rect x="838" y="21" width="6" height="6"/>
    <rect x="820" y="27" width="30" height="6"/>
    <rect x="814" y="33" width="6" height="6"/><rect x="820" y="33" width="6" height="6"/><rect x="838" y="33" width="6" height="6"/><rect x="844" y="33" width="6" height="6"/>
    <rect x="814" y="39" width="42" height="6"/>
    <rect x="814" y="45" width="6" height="6"/><rect x="826" y="45" width="18" height="6"/><rect x="850" y="45" width="6" height="6"/>
    <rect x="820" y="51" width="6" height="6"/><rect x="844" y="51" width="6" height="6"/>
    <rect x="814" y="57" width="6" height="6"/><rect x="826" y="57" width="6" height="6"/><rect x="838" y="57" width="6" height="6"/><rect x="850" y="57" width="6" height="6"/>
  </g>

  <!-- PAC-MAN - bottom left -->
  <g opacity="0.20" filter="url(#subtleGlow)">
    <circle cx="65" cy="230" r="22" fill="#9900ff"/>
    <polygon points="65,230 87,218 87,242" fill="#0a0010"/>
    <!-- dots -->
    <circle cx="100" cy="230" r="4" fill="#cc44ff" opacity="0.8"/>
    <circle cx="118" cy="230" r="4" fill="#cc44ff" opacity="0.6"/>
    <circle cx="136" cy="230" r="4" fill="#cc44ff" opacity="0.4"/>
    <circle cx="154" cy="230" r="4" fill="#cc44ff" opacity="0.25"/>
  </g>

  <!-- GHOST (pac-man ghost) - bottom right -->
  <g opacity="0.18" filter="url(#subtleGlow)" fill="#7700dd">
    <!-- body -->
    <rect x="820" y="210" width="48" height="8" rx="24"/>
    <rect x="812" y="218" width="64" height="32"/>
    <!-- eyes -->
    <rect x="824" y="222" width="10" height="10" fill="#cc88ff"/>
    <rect x="850" y="222" width="10" height="10" fill="#cc88ff"/>
    <rect x="826" y="224" width="4" height="4" fill="#1a0033"/>
    <rect x="852" y="224" width="4" height="4" fill="#1a0033"/>
    <!-- bottom teeth -->
    <rect x="812" y="248" width="10" height="6" fill="#0a0010"/>
    <rect x="826" y="248" width="10" height="6" fill="#0a0010"/>
    <rect x="840" y="248" width="10" height="6" fill="#0a0010"/>
    <rect x="854" y="248" width="10" height="6" fill="#0a0010"/>
    <rect x="868" y="248" width="8" height="6" fill="#0a0010"/>
  </g>

  <!-- PIXEL SPACESHIP - bottom center-right -->
  <g opacity="0.16" filter="url(#subtleGlow)" fill="#aa22ff">
    <rect x="700" y="244" width="6" height="6"/>
    <rect x="694" y="238" width="18" height="6"/>
    <rect x="688" y="232" width="30" height="6"/>
    <rect x="682" y="226" width="42" height="6"/>
    <rect x="682" y="220" width="6" height="6"/><rect x="718" y="220" width="6" height="6"/>
    <!-- engine glow -->
    <rect x="700" y="250" width="6" height="4" fill="#ff44ff" opacity="0.5"/>
  </g>

  <!-- PIXEL STARS scattered -->
  <g fill="#dd66ff" opacity="0.3">
    <rect x="150" y="25" width="3" height="3"/><rect x="280" y="40" width="2" height="2"/>
    <rect x="400" y="18" width="3" height="3"/><rect x="520" y="35" width="2" height="2"/>
    <rect x="640" y="22" width="3" height="3"/><rect x="760" y="48" width="2" height="2"/>
    <rect x="200" y="70" width="2" height="2"/><rect x="350" y="55" width="3" height="3"/>
    <rect x="600" y="65" width="2" height="2"/><rect x="750" y="75" width="3" height="3"/>
    <rect x="100" y="180" width="2" height="2"/><rect x="450" y="260" width="3" height="3"/>
    <rect x="600" y="190" width="2" height="2"/><rect x="800" y="180" width="2" height="2"/>
    <rect x="320" y="200" width="3" height="3"/>
  </g>

  <!-- PIXEL BULLET going up (game element) -->
  <g opacity="0.25" fill="#ff44ff" filter="url(#subtleGlow)">
    <rect x="445" y="240" width="4" height="12"/>
    <rect x="443" y="252" width="8" height="4"/>
  </g>

  <!-- ========== GRID LINES (cyberpunk floor) ========== -->
  <g stroke="#3a0066" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="270" x2="900" y2="270"/>
    <!-- perspective grid lines -->
    <line x1="450" y1="270" x2="0" y2="300"/>
    <line x1="450" y1="270" x2="900" y2="300"/>
    <line x1="450" y1="270" x2="150" y2="300"/>
    <line x1="450" y1="270" x2="750" y2="300"/>
    <line x1="450" y1="270" x2="300" y2="300"/>
    <line x1="450" y1="270" x2="600" y2="300"/>
  </g>

  <!-- ========== CORNER BRACKETS (HUD style) ========== -->
  <g stroke="#cc44ff" stroke-width="2" fill="none" opacity="0.6">
    <!-- top-left -->
    <polyline points="10,10 10,35 35,35"/>
    <polyline points="10,10 35,10"/>
    <!-- top-right -->
    <polyline points="890,10 865,10 865,35"/>
    <polyline points="890,10 890,35"/>
    <!-- bottom-left -->
    <polyline points="10,270 10,245 35,245"/>
    <polyline points="10,270 35,270"/>
    <!-- bottom-right -->
    <polyline points="890,270 865,270 865,245"/>
    <polyline points="890,270 890,245"/>
  </g>

  <!-- ========== SIDE ACCENT LINES ========== -->
  <line x1="0" y1="130" x2="80" y2="130" stroke="#9900ff" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="134" x2="50" y2="134" stroke="#cc44ff" stroke-width="0.5" opacity="0.3"/>
  <line x1="820" y1="130" x2="900" y2="130" stroke="#9900ff" stroke-width="1" opacity="0.5"/>
  <line x1="850" y1="134" x2="900" y2="134" stroke="#cc44ff" stroke-width="0.5" opacity="0.3"/>

  <!-- ========== NEON GLOWING NAME "DHRUV" ========== -->
  <!-- Shadow/glow layer (wide blur) -->
  <text x="450" y="165"
    font-family="'Orbitron', 'Share Tech Mono', monospace"
    font-size="96"
    font-weight="900"
    text-anchor="middle"
    letter-spacing="18"
    fill="#dd00ff"
    filter="url(#neonGlow)"
    opacity="0.7">DHRUV</text>

  <!-- Mid glow layer -->
  <text x="450" y="165"
    font-family="'Orbitron', 'Share Tech Mono', monospace"
    font-size="96"
    font-weight="900"
    text-anchor="middle"
    letter-spacing="18"
    fill="#ee44ff"
    filter="url(#softGlow)"
    opacity="0.9">DHRUV</text>

  <!-- Crisp top layer -->
  <text x="450" y="165"
    font-family="'Orbitron', 'Share Tech Mono', monospace"
    font-size="96"
    font-weight="900"
    text-anchor="middle"
    letter-spacing="18"
    fill="#ffffff">DHRUV</text>

  <!-- ========== SUBTITLE ========== -->
  <text x="450" y="200"
    font-family="'Rajdhani', 'Share Tech Mono', monospace"
    font-size="15"
    font-weight="600"
    text-anchor="middle"
    letter-spacing="6"
    fill="#cc66ff"
    filter="url(#softGlow)">SOFTWARE ENGINEER · AI SYSTEMS · ROBOTICS RESEARCHER</text>

  <!-- Subtitle underline accent -->
  <line x1="160" y1="208" x2="740" y2="208" stroke="#8800ff" stroke-width="1" opacity="0.6"/>
  <line x1="300" y1="211" x2="600" y2="211" stroke="#cc44ff" stroke-width="0.5" opacity="0.4"/>

  <!-- ========== STATUS BAR (game HUD style) ========== -->
  <text x="20" y="265" font-family="monospace" font-size="8" fill="#6600aa" letter-spacing="2" opacity="0.7">PLAYER_01</text>
  <text x="780" y="265" font-family="monospace" font-size="8" fill="#6600aa" letter-spacing="2" opacity="0.7">LVL_∞</text>

  <!-- HP bar game style -->
  <rect x="100" y="258" width="80" height="6" fill="#1a0033" rx="1"/>
  <rect x="100" y="258" width="80" height="6" fill="#9900ff" rx="1" opacity="0.8"/>
  <text x="100" y="256" font-family="monospace" font-size="7" fill="#8800cc" opacity="0.6">HP</text>

  <!-- EXP bar -->
  <rect x="720" y="258" width="60" height="6" fill="#1a0033" rx="1"/>
  <rect x="720" y="258" width="48" height="6" fill="#cc44ff" rx="1" opacity="0.7"/>
  <text x="720" y="256" font-family="monospace" font-size="7" fill="#8800cc" opacity="0.6">EXP</text>

</svg>
