<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Dhruv - Pixel Art GitHub Header</title>
<desc>Retro pixel game scene - Software Engineer, AI and Robotics</desc>
<defs>
<style>
.px{shape-rendering:crispEdges}
@keyframes walk1{0%,49%{transform:translateY(0)}50%,100%{transform:translateY(-2px)}}
@keyframes walk2{0%,49%{transform:translateY(-2px)}50%,100%{transform:translateY(0)}}
@keyframes float1{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes float2{0%,100%{transform:translateY(-3px)}50%{transform:translateY(3px)}}
@keyframes cloud1{0%{transform:translateX(0)}100%{transform:translateX(-900px)}}
@keyframes cloud2{0%{transform:translateX(200px)}100%{transform:translateX(-700px)}}
@keyframes blink{0%,89%,100%{opacity:1}90%,99%{opacity:0}}
@keyframes score{0%,80%{opacity:0;transform:translateY(0)}85%{opacity:1}100%{opacity:0;transform:translateY(-20px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
</style>
</defs>

<!-- SKY -->
<rect width="900" height="200" fill="#1a1a2e" class="px"/>

